<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LaunchPad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --navy: #0b1f3b;
      --navy-light: #102a52;
      --accent: #1f6feb;
      --accent-soft: #e5f0ff;
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border-soft: #e5e7eb;
      --shadow-soft: 0 14px 30px rgba(15, 23, 42, 0.12);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      padding: 40px;
      color: var(--text-main);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 30px;
    }

    .header img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--navy);
    }

    /* Filter Card */
    .filter-card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      margin-bottom: 30px;
    }

    .filter-group {
      margin-bottom: 20px;
    }

    .filter-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
    }

    /* Slider */
    .slider-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-box input {
      width: 100%;
    }

    /* Multi-select dropdown */
    .dropdown {
      width: 100%;
      padding: 10px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-soft);
    }

    /* Selected tags */
    .selected-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .tag {
      background: var(--accent-soft);
      padding: 6px 12px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    .tag .remove {
      font-weight: bold;
      cursor: pointer;
      color: var(--navy);
    }

    /* Buttons */
    .btn {
      background: var(--accent);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }

    .btn:hover {
      background: var(--navy-light);
    }

    /* Job Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--border-soft);
      text-align: left;
    }

    th {
      background: var(--accent-soft);
      font-weight: 600;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <img src="https://via.placeholder.com/48" alt="Logo">
    <h1>LaunchPad</h1>
  </div>

  <!-- Filters -->
  <div class="filter-card">

    <!-- Experience Slider -->
    <div class="filter-group">
      <label class="filter-label">Experience (Years)</label>
      <div class="slider-box">
        <span id="minExpLabel">0</span>
        <input type="range" id="minExp" min="0" max="20" value="0">
        <span id="maxExpLabel">20</span>
        <input type="range" id="maxExp" min="0" max="20" value="20">
      </div>
    </div>

    <!-- Country / Region -->
    <div class="filter-group">
      <label class="filter-label">Country / Region</label>
      <select id="countrySelect" class="dropdown" multiple>
        <optgroup label="Continents">
          <option value="Europe">Europe</option>
          <option value="Asia">Asia</option>
          <option value="Africa">Africa</option>
          <option value="North America">North America</option>
          <option value="South America">South America</option>
        </optgroup>

        <optgroup label="Countries">
          <option value="Netherlands">Netherlands</option>
          <option value="India">India</option>
          <option value="UAE">UAE</option>
          <option value="USA">USA</option>
          <option value="Germany">Germany</option>
        </optgroup>
      </select>

      <div id="selectedTags" class="selected-tags"></div>
    </div>

    <!-- Search Button -->
    <button class="btn" onclick="searchJobs()">Search</button>
    <button class="btn" onclick="downloadExcel()">Download Excel</button>

  </div>

  <!-- Job Table -->
  <table id="jobTable">
    <thead>
      <tr>
        <th>Role</th>
        <th>Company</th>
        <th>Experience</th>
        <th>Location</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    // Tag removal
    const selectedTags = document.getElementById("selectedTags");
    const countrySelect = document.getElementById("countrySelect");

    countrySelect.addEventListener("change", () => {
      selectedTags.innerHTML = "";
      [...countrySelect.selectedOptions].forEach(opt => {
        const tag = document.createElement("div");
        tag.className = "tag";
        tag.innerHTML = `${opt.value} <span class="remove" onclick="removeTag('${opt.value}')">×</span>`;
        selectedTags.appendChild(tag);
      });
    });

    function removeTag(value) {
      [...countrySelect.options].forEach(opt => {
        if (opt.value === value) opt.selected = false;
      });
      countrySelect.dispatchEvent(new Event("change"));
    }

    // Experience slider labels
    const minExp = document.getElementById("minExp");
    const maxExp = document.getElementById("maxExp");
    const minExpLabel = document.getElementById("minExpLabel");
    const maxExpLabel = document.getElementById("maxExpLabel");

    minExp.oninput = () => minExpLabel.textContent = minExp.value;
    maxExp.oninput = () => maxExpLabel.textContent = maxExp.value;

    // Dummy job data
    const jobs = [
      { role: "AI Engineer", company: "Google", exp: 5, loc: "Netherlands" },
      { role: "Data Scientist", company: "Microsoft", exp: 3, loc: "India" },
      { role: "Cloud Architect", company: "AWS", exp: 8, loc: "UAE" }
    ];

    function searchJobs() {
      const min = Number(minExp.value);
      const max = Number(maxExp.value);
      const selected = [...countrySelect.selectedOptions].map(o => o.value);

      const filtered = jobs.filter(j =>
        j.exp >= min &&
        j.exp <= max &&
        selected.includes(j.loc)
      );

      const tbody = document.querySelector("#jobTable tbody");
      tbody.innerHTML = "";

      filtered.forEach(j => {
        tbody.innerHTML += `
          <tr>
            <td>${j.role}</td>
            <td>${j.company}</td>
            <td>${j.exp}</td>
            <td>${j.loc}</td>
          </tr>`;
      });
    }

    // Excel export
    function downloadExcel() {
      alert("Professional Excel export will be added next — formatting, borders, auto-width, colors.");
    }
  </script>

</body>
</html>
